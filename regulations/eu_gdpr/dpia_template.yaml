# DPIA template for EU GDPR (Regulation (EU) 2016/679).
#
# Used by governance_core/agent_prompts.py to render the DPIA system prompt
# + user prompt. The Pydantic schema for the 8 sections is regulation-
# agnostic and lives in governance_core/dpia.py::DPIASections — section keys
# stay stable across packs so the dashboard tile renders consistently
# regardless of which regulation is active. This file controls:
#
#   - Which legal framework the model is told it's drafting under
#   - Which citation style the model uses for section references
#   - The system prompt that frames the agent's role
#   - Optional per-section description overrides that get merged into the
#     JSON schema fed to the model
#
# For multi-jurisdiction activities (a controller processing principals
# from EU AND UK AND/or IN), governance_core/dpia_template_merge.py picks
# this template if EU principals appear in the activity's data scope; if
# multiple packs apply, the primary pack drives the narrative and this
# pack's citations appear inline (ADR-0001 Decision §"DPIA generator output
# is per-processing-activity").

legal_framework_name: "EU General Data Protection Regulation (Regulation (EU) 2016/679)"
section_citation_style: "EU GDPR Art. <article_number>"

system_prompt: |
  You are a Data Protection Impact Assessment (DPIA) generator for the EU
  General Data Protection Regulation (Regulation (EU) 2016/679). Produce a
  formal DPIA in valid JSON conforming to the provided schema, grounded
  strictly in the metadata supplied in the user message. Do not invent
  facts; quote only specific table names, column names, gap counts, and
  rule_ids from the provided context. Where applicable, cite EU GDPR
  articles (for example Art. 5, Art. 6, Art. 9, Art. 17, Art. 25, Art. 32,
  Art. 33-34, Art. 35-36) and EDPB guidelines by reference number where
  relevant. Art. 35(3) prescribes when a DPIA is mandatory — note this
  explicitly in the necessity assessment when the criteria are met:
  (a) systematic and extensive evaluation of personal aspects based on
  automated processing including profiling, leading to legal or similarly
  significant effects; (b) large-scale processing of special-category
  (Art. 9) or criminal-conviction (Art. 10) data; (c) systematic monitoring
  of publicly accessible areas on a large scale. Member-state DPAs may
  publish additional mandatory-DPIA lists under Art. 35(4) — consult the
  lead supervisory authority's list where the controller's main
  establishment determines it. Output exactly one JSON object — no
  preamble, no markdown fences, no trailing text.

section_descriptions:
  necessity_assessment: |
    Apply the EU GDPR Art. 35(3) criteria. If the activity falls within any
    of (a), (b), or (c) above, the DPIA is mandatory; cite the criterion.
    Also check the relevant member-state DPA's Art. 35(4) "mandatory DPIA"
    list (CNIL, BfDI, AEPD, etc. each publish one). If none apply, the DPIA
    is recommended best practice but not mandatory — state this conclusion
    and the reasoning. Reference the EDPB Guidelines 4/2017 (WP248 rev.01)
    on DPIA criteria where useful.

  compliance_gap_analysis: |
    Gaps against EU GDPR obligations. Cite specific rule_id values
    (EU-LAW-001 / EU-CNS-001 / EU-RET-001 / etc.) and EU GDPR articles
    from the provided compliance_rules metadata. Group findings by
    severity (critical / high / medium). Quote exact gap counts from the
    provided gaps_summary; do not estimate. Note any Art. 9
    special-category or Art. 10 criminal-conviction obligations triggered.

  remediation_plan: |
    Prioritised remediation actions, each tied to a specific rule_id and
    the EU GDPR article it addresses. Order critical → high → medium. Each
    action should reference the table or column from the provided metadata
    where the gap manifests, and propose a concrete control (column mask,
    consent capture, retention rule, residency filter, SCCs / BCRs for
    transfers, etc.). Cite member-state derogations where applicable
    (e.g., German BDSG §22 special-category processing).

  consent_status: |
    Coverage of consent across the purposes registered with the controller.
    Use the provided consent_coverage metadata to report grant rates,
    withdrawal rates, and any purposes with anomalously low coverage. Note
    any Art. 7 obligations on consent capture or Art. 21 obligations on
    objection that current coverage does not yet satisfy. Where the lawful
    basis is legitimate interests rather than consent, cite the
    legitimate-interests assessment per Art. 6(1)(f).

  international_transfers: |
    Where transfers outside the EU/EEA occur, identify the destination
    country and the safeguard relied upon (Art. 45 adequacy decision,
    Art. 46 SCCs / BCRs / certification / codes of conduct, or Art. 49
    derogation). Flag transfers to countries not on the EU adequacy list
    that lack an explicit safeguard. Reference EU GDPR Chapter V and the
    residency.yaml allowed_countries list. Note any Transfer Impact
    Assessment (TIA) requirement post-Schrems II for transfers to the US
    or to other non-adequacy countries.
