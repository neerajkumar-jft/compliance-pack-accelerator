# Pack metadata — EU General Data Protection Regulation (Regulation (EU) 2016/679)
#
# Effective across the European Economic Area (EU 27 + Iceland, Liechtenstein,
# Norway) since 25 May 2018. Lead supervisory authority is determined per
# controller's main establishment (one-stop-shop mechanism, Art. 56); the
# European Data Protection Board (EDPB) coordinates across national DPAs and
# issues binding decisions under Art. 65.
#
# This pack is structurally similar to the UK GDPR pack (UK retained EU GDPR
# in its 2018 Data Protection Act with minor amendments), so the rules,
# rights, and DPIA template largely mirror it. Divergences this pack
# captures:
#   - Higher-tier penalty: €20M / 4% of worldwide turnover (vs UK GDPR's
#     £17.5M / 4%).
#   - 24 official languages (vs UK GDPR's en-GB + cy-GB + gd-GB).
#   - Member-state derogations on the minor-age threshold: default 16, can be
#     lowered to 13 by national law (Art. 8(1) — UK, Sweden, Belgium, etc.
#     use 13; Germany, Netherlands, France use 16).
#   - Different statutory retention overrides per member state
#     (HGB / Code de commerce / Codice Civile / etc.).
#   - International transfer mechanisms include Standard Contractual Clauses
#     (EU SCCs, Commission Decision 2021/914) rather than UK's IDTA.

name: "EU General Data Protection Regulation (Regulation (EU) 2016/679)"
code: eu_gdpr
version: "1.0.0"                                    # ADR-0001 Q2 — pack semver (see dpdp_2023/pack.yaml for the bump rules)
jurisdiction: EU                                      # ISO 3166-1 alpha-2 union — matches derive_jurisdiction()'s EEA mapping
effective_date: "2018-05-25"
supervising_authority: "European Data Protection Board (EDPB) + national supervisory authorities"
primary_locale: en

# Penalty structure — two-tier per EU GDPR Art. 83.
# Higher tier: principles (Art. 5), lawful basis (Art. 6, 7, 9, 10), data subject
#   rights (Art. 12-22), transfers (Art. 44-49) — €20M / 4% turnover.
# Standard tier: controller/processor obligations (Art. 8, 11, 25-39, 41-43) —
#   €10M / 2% turnover.
penalty_structure: tiered_per_infringement
max_penalty:
  - amount: 20_000_000                                # €20 million
    currency: EUR
    trigger: "higher-tier infringement (or 4% of worldwide annual turnover, whichever is higher)"
    turnover_percent: 4
  - amount: 10_000_000                                # €10 million
    currency: EUR
    trigger: "standard-tier infringement (or 2% of worldwide annual turnover, whichever is higher)"
    turnover_percent: 2

activates:
  rights:
    - access                # EU GDPR Art. 15
    - rectification         # EU GDPR Art. 16
    - erasure               # EU GDPR Art. 17 ("right to be forgotten")
    - restriction           # EU GDPR Art. 18
    - portability           # EU GDPR Art. 20
    - objection             # EU GDPR Art. 21
    - no_auto_decision      # EU GDPR Art. 22
    - grievance             # Right to lodge complaint with a supervisory authority (Art. 77)

  pii_pattern_packs:
    - eu                    # EU-specific patterns in this pack's pii_patterns.py

  # DPO requirement — Art. 37: mandatory for public authorities, controllers
  # whose core activities require regular and systematic monitoring of data
  # subjects on a large scale, or those engaged in large-scale processing of
  # special-category or criminal-conviction data. Voluntary appointment
  # encouraged.
  requires_dpo: conditional

  # Minor protection — default Art. 8(1) is 16 years for Information Society
  # Services consent. Member states may legislate a lower age (down to 13).
  # The pack ships the EU default; per-deployment override possible via the
  # `minor_age_override` mechanism a future ADR may formalise.
  minor_age: 16

  consent_default: opt_in

  transfer_mechanisms:
    - adequacy_decision               # Art. 45 — Commission decisions (e.g., UK, Japan, NZ)
    - standard_contractual_clauses    # Art. 46(2)(c) — Commission Decision 2021/914 (EU SCCs)
    - binding_corporate_rules         # Art. 47
    - certification_seals             # Art. 46(2)(f)
    - codes_of_conduct                # Art. 46(2)(e)
    - derogations_art_49              # Limited specific situations
