# UK GDPR — Personal-data breach notification SLA.
#
# UK GDPR Art. 33 obligates the controller to notify the ICO of a personal
# data breach within 72 hours of becoming aware, unless the breach is unlikely
# to result in a risk to the rights and freedoms of data subjects. Art. 34
# additionally requires notifying affected data subjects without undue delay
# where the breach is likely to result in a HIGH risk.
#
# For multi-jurisdiction incidents affecting both UK and Indian principals,
# the company is obligated to notify BOTH the ICO (under UK GDPR Art. 33) and
# the DPBI (under DPDP §8(6)) in parallel — see ADR-0001 §"Per-deployment /
# per-company rules".

notification:
  # Primary regulator deadline
  to_authority:
    authority: "Information Commissioner's Office (ICO)"
    deadline_hours: 72
    mandatory: true
    channel: "ico.org.uk/for-organisations/report-a-breach or by telephone (0303 123 1113)"
    content_requirements:
      - description_of_breach
      - categories_and_approx_number_of_data_subjects
      - categories_and_approx_number_of_records
      - data_protection_officer_or_contact_point
      - likely_consequences
      - measures_taken_or_proposed
    risk_exemption: |
      Notification can be omitted if the breach is unlikely to result in a
      risk to the rights and freedoms of natural persons (Art. 33(1)).
      Document the risk assessment.

  # Affected data subject notification
  to_data_subjects:
    mandatory_if: "high risk to the rights and freedoms of natural persons (Art. 34)"
    deadline: "without undue delay"
    deadline_hours: null                # No hard hours; ICO guidance: ASAP
    channel: "direct communication (email, post, in-app) in clear plain language"
    content_requirements:
      - description_of_breach_in_clear_plain_language
      - name_and_contact_details_of_dpo
      - likely_consequences
      - measures_taken_or_proposed
    high_risk_exemptions:
      - technical_organisational_measures_render_data_unintelligible   # e.g., strong encryption
      - subsequent_measures_eliminate_risk
      - disproportionate_effort_to_notify_each_subject                 # use public communication instead

  # Additional cross-border / sectoral obligations the company may face in
  # parallel — not platform-enforced today, listed for the multi-regulator
  # response runbook.
  parallel_obligations:
    - name: "NIS Regulations 2018 — operators of essential services"
      authority: "NCSC + sector-specific competent authority"
      deadline_hours: 72
    - name: "PECR — Reg. 5A communications-service-provider breaches"
      authority: "ICO"
      deadline_hours: 24
      scope: "Public electronic communications service providers only"

# Documentation requirement — Art. 33(5) requires the controller to document
# any personal data breaches, comprising the facts, effects, and remedial
# action taken, regardless of whether notification was made.
internal_log:
  required: true
  table: compliance.breach_log              # Phase 2 — schema to be added
  retention_days: 2190                       # 6 years (matches AML/Companies Act window)
