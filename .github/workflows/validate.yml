name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parse all .py files
        run: |
          set -e
          FAIL=0
          while IFS= read -r f; do
            if ! python3 -c "import ast; ast.parse(open('$f').read())" 2>/dev/null; then
              echo "::error file=$f::syntax error"
              FAIL=1
            fi
          done < <(find scripts pipelines notebooks tests -name '*.py' 2>/dev/null)
          exit $FAIL

  unit-tests:
    name: Local unit tests (no workspace creds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install local-machine deps
        run: |
          python3 -m pip install -r requirements.txt
      - name: Run local unit tests
        run: |
          set -e
          python3 tests/test_m3_composers.py
          python3 tests/test_pack_versioning.py
          python3 tests/test_dpia_multi_pack.py

  html-wellformed:
    name: HTML tag balance check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify docs/*.html are tag-balanced
        run: |
          python3 <<'PY'
          import html.parser, sys, pathlib
          class P(html.parser.HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.stack = []
                  self.errors = []
              def handle_starttag(self, tag, attrs):
                  if tag not in ('br','img','input','meta','link','hr'):
                      self.stack.append(tag)
              def handle_endtag(self, tag):
                  if self.stack and self.stack[-1] == tag:
                      self.stack.pop()
                  else:
                      self.errors.append(tag)
          bad = 0
          for f in pathlib.Path('docs').glob('*.html'):
              p = P(); p.feed(f.read_text())
              if p.stack or p.errors:
                  print(f'::error file={f}::unbalanced tags — stack={p.stack[-5:]} errors={p.errors[:5]}')
                  bad += 1
              else:
                  print(f'  {f}: balanced')
          sys.exit(1 if bad else 0)
          PY

  bundle-validate:
    name: databricks bundle validate
    runs-on: ubuntu-latest
    # Only run when we have CLI creds; PR forks and secret-less pushes skip cleanly.
    if: ${{ github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version
      - name: Install Terraform (workaround for bundled-terraform PGP expiry)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Validate --target dev
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST  }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_TF_EXEC_PATH: /usr/local/bin/terraform
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "::warning::DATABRICKS_HOST / DATABRICKS_TOKEN secrets not set; skipping validate"
            exit 0
          fi
          databricks bundle validate --target dev

  persona-boundary:
    name: Persona boundary test
    runs-on: ubuntu-latest
    needs: bundle-validate
    if: ${{ github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Run persona boundary test
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST  }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "::warning::DATABRICKS_HOST / DATABRICKS_TOKEN secrets not set; skipping boundary test"
            exit 0
          fi
          python3 tests/persona_boundary_test.py

  integration-tests:
    name: Integration tests (INT-01, INT-05, INT-06)
    runs-on: ubuntu-latest
    needs: bundle-validate
    if: ${{ github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Run integration tests
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST  }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          COMPLIANCE_WAREHOUSE_ID: ${{ secrets.COMPLIANCE_WAREHOUSE_ID || secrets.DPDP_WAREHOUSE_ID }}
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "::warning::DATABRICKS_HOST / DATABRICKS_TOKEN secrets not set; skipping integration tests"
            exit 0
          fi
          set -e
          python3 tests/test_register_completeness.py
          python3 tests/test_consent_append_only.py
          python3 tests/test_uc_tags_applied.py
          python3 tests/test_persona_row_filters.py
          python3 tests/test_persona_overview_columns.py
          python3 tests/test_multilang_notices.py
